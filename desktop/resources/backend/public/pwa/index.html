  <script type="module" crossorigin src="./assets/index-e3c-kaOU.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/html5-qrcode-B4PQAKFk.js">
  <link rel="modulepreload" crossorigin href="./assets/axios-42ANG6Sg.js">
  <link rel="stylesheet" crossorigin href="./assets/index-DAPXCoKG.css">
</head>

<body class="bg-primary overflow-hidden overscroll-none">
  <div id="root"></div>
  <script>
    // Register service worker for offline support
    const isNativeApp = !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === 'function' && window.Capacitor.isNativePlatform());
    if (!isNativeApp && 'serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('✅ Service Worker registered');
        }).catch(err => {
          console.warn('⚠️ Service Worker registration failed:', err);
        });
      });
    }

    // Handle install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('📱 PWA installable');
      // Make deferredPrompt available globally for React components
      window.deferredPrompt = deferredPrompt;
    });

    // iOS PWA detection
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS && !window.navigator.standalone) {
      console.log('📱 iOS - User should tap Share → Add to Home Screen');
    }
  </script>
</body>

</html>
